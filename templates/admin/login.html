{% extends "_base.html" %} {% block title %}Login — status.noah.dev{% endblock
%} {% block body %}
<div
  style="
    position: relative;
    z-index: 1;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  "
>
  <div style="width: 100%; max-width: 360px; padding: 24px">
    <div style="text-align: center; margin-bottom: 32px">
      <div
        style="
          font-family: var(--hand);
          font-size: 24px;
          font-weight: 700;
          color: var(--ink);
          margin-top: 4px;
        "
      >
        admin login
      </div>
    </div>

    {% if let Some(err) = error %}
    <div
      style="
        padding: 10px 14px;
        margin-bottom: 16px;
        border-radius: 6px;
        background: color-mix(in srgb, var(--bad) 10%, transparent);
        border: 1px solid var(--bad);
        font-family: var(--mono);
        font-size: 12px;
        color: var(--bad);
      "
    >
      {{ err }}
    </div>
    {% endif %}

    <form
      method="post"
      action="/admin/login"
      style="
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 24px;
      "
    >
      <div style="margin-bottom: 16px">
        <label
          for="password"
          style="
            display: block;
            margin-bottom: 4px;
            font-family: var(--mono);
            font-size: 11px;
            font-weight: 600;
            color: var(--ink3);
            letter-spacing: 0.5px;
            text-transform: uppercase;
          "
        >
          Password
        </label>
        <input
          type="password"
          id="password"
          name="password"
          required
          autofocus
          placeholder="Enter admin password"
          style="
            width: 100%;
            padding: 8px 12px;
            border-radius: 6px;
            border: 1.2px solid var(--line);
            background: var(--paper);
            font-family: var(--mono);
            font-size: 13px;
            color: var(--ink);
            outline: none;
          "
        />
      </div>
      <button
        type="submit"
        style="
          width: 100%;
          padding: 10px;
          border-radius: 6px;
          border: 1.2px solid var(--ink);
          background: var(--ink);
          color: var(--paper);
          font-family: var(--mono);
          font-size: 12px;
          font-weight: 500;
          cursor: pointer;
          transition: opacity 0.15s;
        "
      >
        Sign in
      </button>
    </form>

    <div style="text-align: center; margin-top: 16px">
      <a
        href="/"
        style="font-family: var(--mono); font-size: 11px; color: var(--ink3)"
        >&larr; back to status page</a
      >
    </div>
  </div>
</div>
{% endblock %}
