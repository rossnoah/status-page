name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build Linux x86_64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl

      - name: Install musl tools
        run: sudo apt-get install -y musl-tools

      - name: Build release binary
        run: cargo build --release --target x86_64-unknown-linux-musl

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: status-page-linux-x86_64
          path: target/x86_64-unknown-linux-musl/release/status-page

      - name: Upload deploy artifact
        uses: actions/upload-artifact@v4
        with:
          name: deploy
          path: deploy/

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download binary artifact
        uses: actions/download-artifact@v4
        with:
          name: status-page-linux-x86_64

      - name: Download deploy artifact
        uses: actions/download-artifact@v4
        with:
          name: deploy
          path: deploy/

      - name: Make binary executable
        run: chmod +x status-page

      - name: Create tarball
        run: tar czf status-page-linux-x86_64.tar.gz status-page deploy/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            status-page-linux-x86_64.tar.gz
